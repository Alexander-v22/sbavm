<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBAVM — Kinetic Chain Diagnostics</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
</head>
<body>

    <header>
        <div class="brand">
            <h1>SBAVM</h1>
            <span class="subtitle">Kinetic Chain Diagnostics</span>
        </div>
        <div class="status-group">
            <span id="connection-dot"></span>
            <span id="connection-status">DISCONNECTED</span>
        </div>
    </header>

    <main id="dashboard">

        <section id="body-viz" class="panel">
            <div class="panel-header">
                <h2>Body Kinematics</h2>
                <div class="legend">
                    <span class="legend-item"><i class="dot ankle_right"></i>Ankle R</span>
                    <span class="legend-item"><i class="dot ankle_left"></i>Ankle L</span>
                    <span class="legend-item"><i class="dot waist"></i>Waist</span>
                    <span class="legend-item"><i class="dot wrist_right"></i>Wrist R</span>
                    <span class="legend-item"><i class="dot wrist_left"></i>Wrist L</span>
                </div>
            </div>
            <div class="panel-body">
                <canvas id="three-canvas"></canvas>
            </div>
        </section>

        <section id="chart-panel" class="panel">
            <div class="panel-header">
                <h2>Angular Velocity</h2>
                <span class="panel-sub">|&omega;| deg/s</span>
            </div>
            <div class="panel-body">
                <canvas id="gyro-chart"></canvas>
            </div>
        </section>

        <section id="stats-row">
            <div id="dt-readout" class="panel">
                <div class="panel-header">
                    <h2>Last Punch</h2>
                    <span id="punch-type-badge">--</span>
                </div>
                <div class="dt-values">
                    <div class="dt-metric">
                        <span class="dt-label">&Delta;t1</span>
                        <span id="dt1-value" class="dt-number">--</span>
                        <span class="dt-unit">ms</span>
                    </div>
                    <div class="dt-metric">
                        <span class="dt-label">&Delta;t2</span>
                        <span id="dt2-value" class="dt-number">--</span>
                        <span class="dt-unit">ms</span>
                    </div>
                </div>
            </div>
            <div id="punch-log" class="panel">
                <div class="panel-header">
                    <h2>Punch Log</h2>
                </div>
                <div id="punch-log-entries"></div>
            </div>
        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
